<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather APP</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <main class="main-container">

        <!-- Search -->
        <header class="input-container">
            <input type="text" class="city-input" placeholder="Search City">

            <button class="search-btn">
                <span class="material-symbols-outlined">
                    search
                </span>
            </button>
        </header>

        <!-- Weather Info -->
        <section class="weather-info"   >

            <!-- Location & Date -->
            <div class="location-date-container d-flex justify-content-between align-items-center">

                <div class="location d-flex align-items-center gap-2">

                    <span class="material-symbols-outlined fs-5 text-white">
                        location_on
                    </span>

                    <span class="country-txt text-white fw-bold">
                        India
                    </span>

                </div>

                <span class="current-date-txt text-white">
                    Sun, 05 July
                </span>

            </div>

            <!-- Weather Summary -->
            <div class="weather-summary mt-0">

                <img src="assets/weather/clouds.svg" alt="Weather" class="weather-summary-img">

                <div class="weather-summary-info mt-3">

                    <h1 class="temp-txt fs-4 fw-bold text-white">
                        29°C
                    </h1>

                    <h3 class="condition-text text-white fs-4 fw regular-txt ">
                        Cloud
                    </h3>
                </div>
            </div>
            <div class="weather-conditions-container">


                <!-- Humidity -->
                <div class="condition-item d-flex align-items-start ">

                    <span class="material-symbols-outlined fs-5 me-2 text-white">
                        water_drop
                    </span>

                    <div class="condition-info regular-txt text-white">
                        <div class="condition-title">Humidity</div>
                        <div class="condition-value">55%</div>
                    </div>

                </div>

                <!-- Wind -->
                <div class="condition-item d-flex align-items-start">

                    <span class="material-symbols-outlined fs-5 me-2 text-white">
                        air
                    </span>

                    <div class="condition-info  regular-txt text-white">
                        <div class="condition-title">Wind Speed</div>
                        <div class="condition-value">2 M/s</div>
                    </div>

                </div>

            </div>
        </div>
        <div class="forecast-item-container">
            <div class="forcast-item">
                <h5 class="forecast-item-date regular-txt text-white small fw-semibold">
                    05 July
                </h5>
                <img src="assets/weather/thunderstorm.svg" alt="thunderstorm" class="forecast-item-img">
                <h5 class="forecast-item-temp regular-txt text-white small fw-semibold">29°C</h5>
            </div>
            <div class="forcast-item">
                <h5 class="forecast-item-date regular-txt text-white small fw-semibold">
                    05 July
                </h5>
                <img src="assets/weather/thunderstorm.svg" alt="thunderstorm" class="forecast-item-img">
                <h5 class="forecast-item-temp regular-txt text-white small fw-semibold">29°C</h5>
            </div>
            <div class="forcast-item">
                <h5 class="forecast-item-date regular-txt text-white small fw-semibold">
                    05 July
                </h5>
                <img src="assets/weather/thunderstorm.svg" alt="thunderstorm" class="forecast-item-img">
                <h5 class="forecast-item-temp regular-txt text-white small fw-semibold">29°C</h5>
            </div>
            <div class="forcast-item">
                <h5 class="forecast-item-date regular-txt text-white small fw-semibold">
                    05 July
                </h5>
                <img src="assets/weather/thunderstorm.svg" alt="thunderstorm" class="forecast-item-img">
                <h5 class="forecast-item-temp regular-txt text-white small fw-semibold">29°C</h5>
            </div>
        </div>
        </section>



    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
